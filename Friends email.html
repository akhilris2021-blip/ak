<!DOCTYPE html>
<html>
<head>
<title>Best Friend Forever</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
overflow:hidden;
}

.container{
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
z-index:2;
}

.friend-img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:6px solid #ff6fa5;
margin-bottom:15px;
}

h1{
color:#444;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4081;
color:white;
}

#no{
background:#555;
color:white;
position:absolute;
transition:0.3s;
}

#message{
margin-top:20px;
font-size:22px;
color:#ff4081;
font-weight:bold;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d88;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="container">

<img class="friend-img" src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png">

<h1>Will you be my Best Friend Forever? 💕</h1>

<button id="yes" onclick="showMessage()">Yes 😊</button>
<button id="no">No 🙈</button>

<div id="message"></div>

</div>

<script>

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",function(){

const x=Math.random()*window.innerWidth*0.8;
const y=Math.random()*window.innerHeight*0.8;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

/* message + confetti */

function showMessage(){

document.getElementById("message").innerHTML=
"Yayyy!! 🎉 You said YES! 💕<br><br>I'm really lucky to have a friend like you 😊<br>Best friends forever! 🌸✨";

for(let i=0;i<120;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
confetti.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

}

}

/* floating hearts */

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
